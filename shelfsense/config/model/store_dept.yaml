_target_: shelfsense.models.lightgbm.store_dept.StoreDeptTrainer

# WS2.5 V5 — 70 per-slice models (10 stores × 7 departments).
# Recursive 28-step inference via predict_horizon (8-12% compounding gap).
# tvp=1.3 fixed per-slice; per-slice Optuna 10 trials over 5 hyperparams.
# Val WRMSSE 0.6294 (full catalogue), private LB 0.5854.
# Design hash covers objective/tvp/data-range/n_optuna/feature-set — change any
# constant and the hash flips, forcing full retrain.

objective: tweedie
metric: tweedie
tweedie_variance_power: 1.3

# Per-slice Optuna search space (10 trials/slice)
optuna_trials: 10
lr_min: 0.01
lr_max: 0.1            # log-scale search
num_leaves_min: 31
num_leaves_max: 127
min_data_in_leaf_min: 20
min_data_in_leaf_max: 100
feature_fraction_min: 0.5
feature_fraction_max: 1.0
bagging_fraction_min: 0.5
bagging_fraction_max: 1.0

num_boost_round: 3000
early_stopping_rounds: 75
bagging_freq: 1
seed: 42
num_threads: 0
verbose: -1

# Slice definitions
stores: [CA_1, CA_2, CA_3, CA_4, TX_1, TX_2, TX_3, WI_1, WI_2, WI_3]
departments: [FOODS_1, FOODS_2, FOODS_3, HOBBIES_1, HOBBIES_2, HOUSEHOLD_1, HOUSEHOLD_2]

# Recursive forecaster settings
history_days: 200      # must match shelfsense.models.lightgbm.recursive.HISTORY_DAYS
